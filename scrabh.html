<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fynresh — File Converter Town</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(typeof pdfjsLib!=="undefined")pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ════════════════════════════════
   BASE / RESET
════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#04010c;--panel:#09061a;--s1:#100828;--s2:#181040;
  --purple:#8b3dff;--cyan:#00d4ff;--pink:#ff2d78;--gold:#ffcc00;--green:#00ff96;
  --text:#eae4ff;--t2:#7a6ea8;--t3:#3a3260;
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;touch-action:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60vw 40vh at 10% 15%,rgba(139,61,255,.08),transparent 60%),
    radial-gradient(ellipse 50vw 35vh at 90% 75%,rgba(0,212,255,.05),transparent 60%);}

/* ════════════════════════════════
   LAYOUT
════════════════════════════════ */
#app{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1;overflow:hidden}

/* ════ HUD ════ */
#hud{
  height:48px;flex-shrink:0;
  background:rgba(4,1,12,.97);
  border-bottom:1px solid rgba(139,61,255,.15);
  padding:0 14px;
  display:flex;align-items:center;gap:10px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:relative;z-index:50;
}
@media(max-width:480px){
  #hud{padding:0 10px;gap:7px;height:44px}
  .logo{font-size:16px;letter-spacing:2px}
  #hxp{max-width:80px;min-width:50px}
  #hloc{display:none}
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  background:linear-gradient(120deg,#c084fc,#60c8ff);background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex-shrink:0;line-height:1;}
.hchip{display:flex;align-items:center;gap:4px;height:24px;padding:0 10px;border-radius:12px;font-family:'Space Mono',monospace;font-size:10px;border:1px solid;flex-shrink:0}
.hchip-g{background:rgba(255,204,0,.06);border-color:rgba(255,204,0,.2);color:var(--gold)}
.hchip-p{background:rgba(139,61,255,.07);border-color:rgba(139,61,255,.22);color:#c084fc}
/* XP in HUD */
#hxp{flex:1;min-width:50px;max-width:160px;display:flex;flex-direction:column;gap:2px}
#hxp-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);display:flex;justify-content:space-between}
#hxp-track{height:4px;background:rgba(139,61,255,.1);border-radius:2px;overflow:hidden}
#hxp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--cyan));width:0%;transition:width .5s}
#hloc{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);padding:2px 8px;border-radius:5px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.12);flex-shrink:0;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}

/* ════ WORLD ════ */
#world-wrap{flex:1;position:relative;overflow:hidden;cursor:default}
#world-c{position:absolute;top:0;left:0;height:100%;image-rendering:pixelated;display:block}
/* ── LOGO ── */
.logo{display:inline-flex;flex-direction:row;align-items:center;gap:8px;text-decoration:none;line-height:1}
.logo-img{height:36px;width:auto;display:block;flex-shrink:0;mix-blend-mode:multiply}
[data-theme="dark"] .logo-img{mix-blend-mode:lighten}
.logo-img-fallback{font-family:var(--mono);font-size:1rem;font-weight:700;letter-spacing:-.02em;color:var(--accent);display:none;flex-shrink:0}
.logo-img.errored{display:none}
.logo-img.errored ~ .logo-img-fallback{display:block}
.logo-beta{font-family:var(--mono);font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--accent);padding:4px 6px;border-radius:2px;flex-shrink:0;line-height:1.4;align-self:center;writing-mode:vertical-lr}
[data-theme="light"] .logo-beta{color:#fff}
[data-theme="dark"] .logo-beta{color:#000}

.header-right{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
   
/* Global drop overlay */
#world-wrap.drag-on::after{
  content:'✦  Drop files here! ✦';
  position:absolute;inset:0;z-index:60;pointer-events:none;
  background:rgba(139,61,255,.12);border:2px dashed rgba(139,61,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4vw,24px);
  letter-spacing:3px;color:rgba(192,132,252,.9);
}

/* ════ D-PAD ════ */
#dpad{
  position:fixed;bottom:env(safe-area-inset-bottom,8px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
  left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:8px;z-index:200;
}
@media(pointer:coarse){#dpad{display:flex}}
.dp-btn{
  background:rgba(10,6,28,.88);border:1.5px solid rgba(139,61,255,.4);
  color:#c084fc;font-family:'Space Mono',monospace;
  border-radius:10px;cursor:pointer;touch-action:none;
  user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;justify-content:center;
}
#dp-l,#dp-r{width:52px;height:44px;font-size:20px}
#dp-mid{width:80px;height:44px;font-size:8.5px;letter-spacing:.05em;background:rgba(139,61,255,.18);border-color:rgba(139,61,255,.55);color:#d4aaff}
.dp-btn:active{background:rgba(139,61,255,.3);color:#fff;transform:scale(.95)}

/* ════ DIALOGUE ════ */
#dlg{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
  left:50%;transform:translateX(-50%);
  width:min(540px,94vw);
  background:rgba(4,1,12,.97);
  border:1px solid rgba(255,204,0,.32);border-radius:12px;
  padding:14px 18px;z-index:600;display:none;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
#dlg::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,204,0,.45),transparent)}
#dlg-nm{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
#dlg-tx{font-size:13px;line-height:1.6;color:var(--text)}
#dlg-cta{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,204,0,.4);text-align:right;margin-top:8px;animation:blink .9s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ════ TOAST ════ */
#toast{position:fixed;top:56px;right:12px;background:rgba(5,3,14,.97);border:1px solid rgba(255,255,255,.07);border-radius:10px;border-left:3px solid var(--purple);padding:10px 14px;font-size:12px;z-index:9999;display:none;max-width:min(240px,80vw);backdrop-filter:blur(20px);word-break:break-word}
#toast.ok{border-left-color:var(--green);color:var(--green)}
#toast.err{border-left-color:var(--pink);color:var(--pink)}
#toast.inf{border-left-color:var(--cyan);color:var(--cyan)}

/* ════ XP POP ════ */
@keyframes xppop{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-20px) scale(1.1)}100%{opacity:0;transform:translateY(-36px)}}
@keyframes lvup-in{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}60%{transform:translate(-50%,-50%) scale(1.05)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes lvup-out{0%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.15)}}
@keyframes pflyup{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--px),var(--py))}}

/* ════ LEVEL UP CARD ════ */
#lvup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;pointer-events:auto;cursor:default}
#lvup-card{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#0c0620,#1a0840,#0c0620);
  border:2px solid #7b4fff;border-radius:16px;
  padding:clamp(20px,5vw,36px) clamp(20px,6vw,48px);
  text-align:center;z-index:2001;display:none;pointer-events:auto;
  width:min(360px,90vw);
  box-shadow:0 0 80px rgba(123,79,255,.35);
}
/* Close button on level-up card */
#lvu-close{
  position:absolute;top:12px;right:14px;
  width:30px;height:30px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:50%;
  color:rgba(255,255,255,.5);
  font-size:14px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;
  font-family:sans-serif;
  -webkit-tap-highlight-color:transparent;
}
#lvu-close:hover,#lvu-close:active{
  background:rgba(255,45,120,.18);
  border-color:rgba(255,45,120,.45);
  color:#ff6699;
  transform:scale(1.1);
}
#lvup-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,#7b4fff,#00d4ff,#ff2d78,#ffcc00,#7b4fff);background-size:200%;animation:barFlow 2s linear infinite}
@keyframes barFlow{0%{background-position:0%}100%{background-position:200%}}
.lvu-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;color:#c084fc;margin-bottom:6px}
.lvu-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,15vw,80px);letter-spacing:4px;line-height:1;margin-bottom:4px}
.lvu-sub{font-family:'Space Mono',monospace;font-size:10px;color:#9b8fc0;letter-spacing:.08em;margin-bottom:16px}
.lvu-unlocked{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);padding:10px 14px;border-radius:8px;font-size:13px;color:#fff;line-height:1.6}
.lvu-unlocked b{color:#ffcc00}
.lvu-particle{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:2002;animation:pflyup 1s ease-out forwards}

/* ════════════════════════════════
   SHOP MODAL — Mobile-first bottom sheet
════════════════════════════════ */
#smodal{
  position:fixed;inset:0;z-index:500;display:none;
  align-items:flex-end;justify-content:center;
  background:rgba(2,0,8,.78);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
#spanel{
  width:100%;max-width:860px;
  height:90dvh;
  display:flex;flex-direction:column;
  background:#09061a;
  border:1px solid rgba(255,255,255,.06);border-bottom:none;
  border-radius:18px 18px 0 0;
  animation:riseUp .25s cubic-bezier(.34,1.4,.64,1);
  overflow:hidden;
  box-shadow:0 -24px 80px rgba(0,0,0,.7);
}
@keyframes riseUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
#spanel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:10;
  background:var(--accent-bar,linear-gradient(90deg,#8b3dff,#00d4ff,#ff2d78,#ffcc00,#8b3dff));
  background-size:400%;animation:barFlow 4s linear infinite;}

/* Handle bar */
#spanel::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15)}

/* Panel header */
.sph{
  display:flex;align-items:center;gap:12px;
  padding:18px 18px 12px;
  background:rgba(255,255,255,.018);
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;
}
.sph-icon{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,rgba(139,61,255,.2),rgba(0,212,255,.1));border:1px solid rgba(139,61,255,.25)}
.sph-info{flex:1;min-width:0}
.sph-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(15px,4vw,20px);letter-spacing:2.5px;color:#fff;line-height:1}
.sph-desc{font-size:clamp(10px,2.5vw,11.5px);color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sph-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sph-lv{display:flex;align-items:center;gap:4px;height:24px;padding:0 10px;border-radius:12px;background:rgba(255,204,0,.07);border:1px solid rgba(255,204,0,.18);font-family:'Space Mono',monospace;font-size:9px;color:var(--gold)}
.sph-close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-family:'Space Mono',monospace;font-size:9px;padding:6px 11px;cursor:pointer;border-radius:7px;transition:all .16s;white-space:nowrap}
.sph-close:hover,.sph-close:active{background:rgba(255,45,120,.1);border-color:rgba(255,45,120,.3);color:var(--pink)}

/* Body — desktop: two columns. Mobile: single scrollable column */
#spbody{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:1fr 300px;
  overflow:hidden;
}

/* Main tool panel — desktop */
#spmain{
  padding:20px 24px 24px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:rgba(139,61,255,.2) transparent;
  min-height:0;
}
#spmain::-webkit-scrollbar{width:4px}
#spmain::-webkit-scrollbar-thumb{background:rgba(139,61,255,.2);border-radius:2px}

/* Sidebar — desktop */
#spsidebar{
  border-left:1px solid rgba(255,255,255,.05);
  background:rgba(0,0,0,.25);
  padding:16px 14px 16px;
  display:flex;flex-direction:column;gap:10px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  min-height:0;
}

/* ── MOBILE: single scrollable column ── */
@media(max-width:660px){
  #spanel{height:92dvh}
  #spbody{
    grid-template-columns:1fr;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
    /* Children must NOT have their own overflow so spbody is the single scroller */
  }
  #spmain{
    overflow-y:visible;
    overflow-x:visible;
    padding:14px 14px 0;
    min-height:0;
    /* Allow content to be its natural height — spbody scrolls */
  }
  #spsidebar{
    border-left:none;
    border-top:1px solid rgba(255,255,255,.05);
    overflow-y:visible;
    overflow-x:visible;
    padding:12px 14px 80px; /* 80px bottom padding clears D-pad */
    min-height:0;
  }
  /* Smaller text on mobile to fit more content */
  .sec{font-size:8px;margin:12px 0 7px}
  .info-box{font-size:12px;padding:9px 12px;margin-bottom:10px}
  .cat-tabs{margin-bottom:8px}
  .ctab{font-size:10px;padding:5px 9px}
  .fmt-grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:4px;max-height:160px}
  .fmtb{padding:8px 3px 6px;border-radius:8px}
  .fmtb .fi{font-size:16px;margin-bottom:3px}
  .fmtb .fn{font-size:8px}
  .conv-bar{padding:10px 12px;margin:8px 0}
  .cd-v{font-size:26px}
  .cd-arr{font-size:17px}
  .qpicks{gap:4px;margin-bottom:3px}
  .qp{font-size:9px;padding:4px 8px}
  .qbtns{gap:5px;margin:6px 0}
  .qb{min-width:0;flex:1;padding:8px 8px;font-size:11.5px}
  .size-row{gap:8px;margin:5px 0}
  .szf input{width:110px;font-size:15px;padding:7px 10px}
  .ub{padding:7px 10px;font-size:10.5px}
  .presets{gap:4px;margin:4px 0}
  .pp{font-size:9px;padding:4px 8px}
  .pdf-tools{grid-template-columns:repeat(3,1fr);gap:5px;margin:5px 0}
  .pt{padding:11px 5px 9px;border-radius:9px}
  .pt-ic{font-size:20px;margin-bottom:4px}
  .pt-nm{font-size:7px}
  .pt-ds{font-size:8.5px}
  .mbtns{gap:3px;margin:5px 0}
  .mb{padding:6px 10px;font-size:11px}
  .rot-btns{gap:5px}
  .rb{padding:8px 10px;font-size:12px}
  .wm-grid{grid-template-columns:1fr;gap:7px}
  /* Sidebar components on mobile */
  .sb-drop{padding:14px 10px 12px}
  .sb-drop .dz-ic{font-size:22px;margin-bottom:4px}
  .sb-drop .dz-t{font-size:11px}
  .sb-files{max-height:120px}
  .sf{padding:7px 10px;gap:6px}
  .sf-name{font-size:10.5px}
  .btn-go{padding:11px 12px;font-size:15px;letter-spacing:2.5px}
  .btn-sec,.btn-zip{padding:8px 6px;font-size:11px}
  select{font-size:13px;padding:8px 10px}
  .opt-box{font-size:12px;padding:9px 11px}
  .opt-box input{font-size:12px;padding:7px 10px}
}

/* ── TINY PHONES (≤380px) ── */
@media(max-width:380px){
  .sph{padding:12px 12px 10px;gap:8px}
  .sph-icon{width:36px;height:36px;font-size:17px;border-radius:8px}
  .sph-name{font-size:14px;letter-spacing:1.5px}
  .sph-desc{display:none}
  #spmain{padding:11px 11px 0}
  #spsidebar{padding:10px 11px 80px}
  .pdf-tools{grid-template-columns:repeat(3,1fr);gap:4px}
  .pt-ds{display:none}
  .fmt-grid{grid-template-columns:repeat(auto-fill,minmax(54px,1fr))}
}

/* ════ SHARED UI COMPONENTS ════ */
.sec{
  font-family:'Space Mono',monospace;font-size:9px;
  color:rgba(139,61,255,.65);letter-spacing:.18em;text-transform:uppercase;
  margin:18px 0 10px;display:flex;align-items:center;gap:10px;
}
.sec::after{content:'';flex:1;height:1px;background:rgba(139,61,255,.12)}
.sec:first-child{margin-top:0}

.info-box{
  display:flex;align-items:flex-start;gap:10px;
  background:rgba(139,61,255,.05);border:1px solid rgba(139,61,255,.15);
  border-left:3px solid rgba(139,61,255,.5);border-radius:0 8px 8px 0;
  padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--t2);line-height:1.65;
}
.info-box::before{content:'ℹ';font-size:14px;color:rgba(139,61,255,.6);flex-shrink:0;line-height:1.4}
.info-box b{color:#c084fc}
.info-box.cy{background:rgba(0,212,255,.04);border-color:rgba(0,212,255,.12);border-left-color:rgba(0,212,255,.45)}
.info-box.cy::before{color:rgba(0,212,255,.55)}.info-box.cy b{color:var(--cyan)}

/* Category tabs */
.cat-tabs{
  display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;
  padding:4px;background:rgba(0,0,0,.22);border-radius:10px;
  border:1px solid rgba(255,255,255,.05);
}
.ctab{
  font-size:11px;padding:6px 13px;border-radius:7px;
  border:none;background:transparent;color:var(--t3);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.ctab:hover,.ctab:active{color:var(--t2);background:rgba(255,255,255,.05)}
.ctab.on{background:rgba(139,61,255,.2);color:#c084fc;box-shadow:0 0 0 1px rgba(139,61,255,.38)}

/* Format grid */
.fmt-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:6px;margin-bottom:14px;max-height:200px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
@media(max-width:480px){.fmt-grid{grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:5px}}
.fmtb{
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:10px 4px 8px;text-align:center;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.fmtb:hover{border-color:rgba(139,61,255,.35);background:rgba(139,61,255,.08);transform:translateY(-1px)}
.fmtb:active,.fmtb.sel{

<script>
/* ════ GLOBALS ════ */
const canvas=document.getElementById('world-c'),ctx=canvas.getContext('2d');
const CW=1800,CH=360;
canvas.width=CW;canvas.height=CH;

let px=200,py=252,pvx=0,facing=1,wf=0,wt=0;
let keys={},coins=0,xp=0,level=1;

// ── LOAD SAVED STATE ──
function loadSave(){
  try{
    const sv=JSON.parse(localStorage.getItem('filequest_save')||'{}');
    if(sv.coins!=null)coins=sv.coins;
    if(sv.xp!=null)xp=sv.xp;
    if(sv.level!=null)level=Math.max(1,Math.min(10,sv.level));
  }catch(e){}
}
function saveGame(){
  try{localStorage.setItem('filequest_save',JSON.stringify({coins,xp,level,savedAt:Date.now()}));}catch(e){}
}
loadSave();
let shopOpen=false,dlgOpen=false,nearShop=null,worldOff=0,lastT=0;
let cloudX=[80,360,700,1050,1420],stars=[];
let currentShopId=null;

// Stars
for(let i=0;i<140;i++)stars.push({x:Math.random()*CW,y:Math.random()*140,s:Math.random()*2+.5,b:Math.random()});


const FORMATS={
  image:{label:'🖼 Image',fmts:['jpg','jpeg','png','webp','svg','heic']},
  audio:{label:'🎵 Audio',fmts:['mp3','wav','ogg','aac','m4a']},
  video:{label:'🎬 Video',fmts:['mp4','webm','mov']},
  office:{label:'📄 Office',fmts:['docx','pptx','xlsx']},
  doc:{label:'📃 Doc',fmts:['pdf','txt','html']},
  data:{label:'🔢 Data',fmts:['json','csv','xml']}
};
const CONV={
  jpg:['png','webp','jpeg','pdf'],jpeg:['png','webp','jpg','pdf'],
  png:['jpg','jpeg','webp','pdf'],webp:['png','jpg','jpeg','pdf'],
  svg:['png','jpg','webp','pdf'],heic:['jpg','jpeg','png','webp'],
  mp3:['wav','ogg'],wav:['mp3','ogg'],ogg:['mp3','wav'],aac:['wav','mp3'],m4a:['wav','mp3'],
  mp4:['mp3','wav'],webm:['mp3','wav'],mov:['mp4','mp3','wav'],
  docx:['pdf','txt','html'],pptx:['pdf','txt','html'],
  xlsx:['csv','json','txt','html','pdf'],
  pdf:['txt','html','png','csv'],
  txt:['pdf','html'],html:['txt','pdf'],
  json:['csv','txt'],csv:['json','txt','xlsx'],xml:['txt']

// Per-level decoration config (shared logic, appearance differs by shop)
// Each floor is a fixed height. Building grows upward from ground level.
const FLOOR_H=42; // pixels per floor. 1fl=42px, 5fl=210px, all fit in canvas.

function getBuildingConfig(lv){
  // floors grow with level — each adds FLOOR_H px of real height upward
  const floors = lv<=2?1:lv<=4?2:lv<=6?3:4; // max 4 floors
  return{
    floors,
    totalH: floors * FLOOR_H,     // actual building height in pixels
    floorH: FLOOR_H,               // each floor is always this tall
    hasAwning:    lv>=4,
    hasBanner:    lv>=5,
    hasNeonSign:  lv>=6,
    hasSpire:     lv>=6,
    hasFountain:  lv>=7,
    hasArch:      lv>=8,
    hasGlowOrbs:  lv>=9,
    isLegendary:  lv>=10,
    windowCols:   lv<=2?2:lv<=5?2:lv<=7?3:4,
    glowIntensity:lv/10,
    roofStyle:    lv<=2?'flat':lv<=4?'pitched':lv<=7?'domed':'tower',
    wallStyle:    lv<=2?'plain':lv<=4?'brick':lv<=6?'marble':lv<=8?'glass':'golden'
  };
}



/* ════════════════════════════════════════════
   3D ISOMETRIC WORLD RENDERER
   Using isometric projection: pixel-art 2.5D
   Each building drawn with top + left + right faces
════════════════════════════════════════════ */

// Isometric helpers
function isoX(x,y){return (x-y)*0.866;}  // cos30 ≈ 0.866
function isoY(x,y){return (x+y)*0.5;}    // sin30 = 0.5

// Draw a 3D box in isometric space (grid units → canvas pixels)
// ox,oy = origin on canvas, w,d,h = width/depth/height in pixels, cols for faces
function drawIsoBox(ox,oy,w,d,h,colTop,colLeft,colRight){
  // Top face (parallelogram)
  ctx.fillStyle=colTop;
  ctx.beginPath();
  ctx.moveTo(ox,oy);
  ctx.lineTo(ox+w,oy-w*0.5);
  ctx.lineTo(ox+w+d,oy-w*0.5+d*0.5);
  ctx.lineTo(ox+d,oy+d*0.5);
  ctx.closePath();ctx.fill();
  // Left face
  ctx.fillStyle=colLeft;
  ctx.beginPath();
  ctx.moveTo(ox,oy);
  ctx.lineTo(ox+d,oy+d*0.5);
  ctx.lineTo(ox+d,oy+d*0.5+h);
  ctx.lineTo(ox,oy+h);
  ctx.closePath();ctx.fill();
  // Right face
  ctx.fillStyle=colRight;
  ctx.beginPath();
  ctx.moveTo(ox+d,oy+d*0.5);
  ctx.lineTo(ox+w+d,oy-w*0.5+d*0.5);
  ctx.lineTo(ox+w+d,oy-w*0.5+d*0.5+h);
  ctx.lineTo(ox+d,oy+d*0.5+h);
  ctx.closePath();ctx.fill();
}

// Brighter/darker color
function shade(hex,a){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,Math.max(0,(n>>16)+a));
  const g=Math.min(255,Math.max(0,((n>>8)&255)+a));
  const b=Math.min(255,Math.max(0,(n&255)+a));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function hexToRgba(hex,a){
  const n=parseInt(hex.slice(1),16);
  return`rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}

  // Trunk — iso box
  const tw=10,td=10,th=24;

    drawIsoBox(tx+(6-w/2)*0.5,ty-th-i*12+2,w,d,h,ct,cl,cr);
  });
}

function drawShop3D(s){
  const{x,groundY,w,sign,glow,id}=s;
  const lv=Math.min(10,Math.max(1,level));
  const pal=SHOP_PALETTES[id][lv-1];
  const cfg=getBuildingConfig(lv);

  const floorH=cfg.floorH;   // each floor = FLOOR_H px
  const totalH=cfg.totalH;   // grows with level
  const baseY=groundY-totalH; // top of building, grows upward

  const wallC=pal.wall[0];
  const sideC=shade(wallC,-30);
  const topC=shade(wallC,25);
  const roofC=pal.roof;

  // ── GLOW HALO ──
  const glowA=0.06+cfg.glowIntensity*0.12;
  const gl=ctx.createRadialGradient(x+w/2,baseY+totalH/2,10,x+w/2,baseY+totalH/2,w*1.0);
  gl.addColorStop(0,glow.replace('.5',String(glowA)));
  gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.fillRect(x-40,baseY-40,w+80,totalH+80);

  // ── 3D ISOMETRIC BUILDING ──
  // We'll fake iso by drawing: front face, right side face, and a top
  const isoDepth=32;   // depth of the iso side face
  const isoShift=16;   // how much the right face shifts up (simulates angle)

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();
  ctx.moveTo(x+isoDepth,baseY+totalH+isoShift);
  ctx.lineTo(x+w+isoDepth,baseY+totalH+isoShift);
  ctx.lineTo(x+w+isoDepth+6,baseY+totalH+isoShift+3);
  ctx.lineTo(x+isoDepth+6,baseY+totalH+isoShift+3);
  ctx.closePath();ctx.fill();

  // ── FRONT FACE (main building) ──
  for(let fl=0;fl<cfg.floors;fl++){
    const fy=baseY+fl*floorH;
    const isGround=(fl===cfg.floors-1);
    const isTop=(fl===0);

    // Wall fill
    if(cfg.wallStyle==='golden'&&lv===10){
      const wg=ctx.createLinearGradient(x,fy,x+w,fy+floorH);
      const gs=0.5+0.5*Math.sin(tick*.04+fl*.5);
      wg.addColorStop(0,wallC);wg.addColorStop(gs*.5,shade(wallC,30));wg.addColorStop(1,shade(wallC,-10));
      ctx.fillStyle=wg;
    } else if(lv>=7){
      const wg=ctx.createLinearGradient(x,fy,x+w,fy+floorH);
      wg.addColorStop(0,shade(wallC,15));wg.addColorStop(1,wallC);
      ctx.fillStyle=wg;
    } else {
      const wg=ctx.createLinearGradient(x,fy,x,fy+floorH);
      wg.addColorStop(0,isTop?shade(wallC,10):wallC);wg.addColorStop(1,shade(wallC,-8));
      ctx.fillStyle=wg;
    }
    ctx.fillRect(x,fy,w,floorH);

    // Brick pattern
    if(lv>=3&&lv<=6){
      ctx.fillStyle='rgba(0,0,0,.06)';
      for(let by=fy+4;by<fy+floorH-2;by+=9){
        const off=(Math.round(by/9)%2===0?0:10);
        for(let bx=x+off;bx<x+w-2;bx+=20){ctx.fillRect(bx,by,16,6);}
      }
    }
    // Glass sheen
    if(lv>=7){
      ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(x,fy,w/2,floorH);
    }
    // Side shading
    ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(x+w-12,fy,12,floorH);
    ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(x,fy,w,2);

    // Floor separator
    if(!isGround){
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(x,fy+floorH-3,w,3);
      ctx.fillStyle=pal.trim+'33';ctx.fillRect(x,fy+floorH-2,w,2);
    }

    // ── WINDOWS (front face) ──
    const wCols=isGround?2:Math.min(4,cfg.windowCols);
    const wW=Math.min(20,Math.floor((w-14)/wCols));
    const wH=Math.min(16,floorH-12);
    const wSp=Math.floor((w-6)/wCols);
    for(let wc=0;wc<wCols;wc++){
      if(isGround&&wc===Math.floor(wCols/2))continue;
      const wx=x+6+(wc*wSp);
      const wy=fy+Math.floor((floorH-wH)/2);
      ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(wx-1,wy-1,wW+2,wH+2);
      // Glass
      const wg=ctx.createLinearGradient(wx,wy,wx+wW,wy+wH);
      if(lv>=7){wg.addColorStop(0,'rgba(100,180,255,.45)');wg.addColorStop(1,'rgba(60,100,200,.2)');}
      else{wg.addColorStop(0,'rgba(255,220,120,.32)');wg.addColorStop(1,'rgba(255,160,60,.12)');}
      ctx.fillStyle=wg;ctx.fillRect(wx,wy,wW,wH);
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.fillRect(wx+Math.floor(wW/2),wy,1,wH);
      ctx.fillRect(wx,wy+Math.floor(wH/2),wW,1);
      // Sill
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(wx-1,wy+wH,wW+2,3);
      // Glow at high levels
      if(lv>=5){
        const ga=0.12+0.08*Math.sin(tick*.07+wc*.8);
        ctx.fillStyle=`rgba(${lv>=9?'255,220,100':'200,200,255'},${ga})`;
        ctx.fillRect(wx,wy,wW,2);
      }
    }

    // Ground floor door
    if(isGround){
      const dx=x+w/2-9;
      const dh=floorH-6; // door height scales with floor
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(dx,fy+floorH-dh,18,dh);
      const dg=ctx.createLinearGradient(dx,fy+floorH-dh,dx+18,fy+floorH);
      dg.addColorStop(0,lv>=8?'#ddaa44':'#886622');dg.addColorStop(1,lv>=8?'#aa7722':'#553311');
      ctx.fillStyle=dg;ctx.fillRect(dx+1,fy+floorH-dh+2,16,dh-2);
      ctx.fillStyle='rgba(150,200,255,.15)';ctx.fillRect(dx+1,fy+floorH-dh+2,7,Math.round(dh*.4));
      ctx.fillStyle=lv>=7?'#ffd700':'#ccaa44';ctx.fillRect(dx+12,fy+floorH-Math.round(dh*.4),3,3);
      // Steps
      ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(dx-4,fy+floorH-4,26,4);ctx.fillRect(dx-6,fy+floorH,28,4);
      // Awning (lv4+)
      if(cfg.hasAwning){
        const aw=w-10;
        const awY=fy+floorH-dh-6; // just above door
        ctx.fillStyle=pal.accent+'cc';ctx.fillRect(x+5,awY,aw,7);
        ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(x+5,awY+6,aw,1);
        for(let fi2=0;fi2<Math.floor(aw/6);fi2++){
          ctx.fillStyle=pal.trim;ctx.fillRect(x+5+fi2*6,awY+6,3,4);
        }
      }
    }
  }// floors

  // ── ISO RIGHT FACE ──
  // A parallelogram on the right side for 3D depth
  ctx.fillStyle=sideC;
  ctx.beginPath();
  ctx.moveTo(x+w, baseY);
  ctx.lineTo(x+w+isoDepth, baseY-isoShift);
  ctx.lineTo(x+w+isoDepth, baseY-isoShift+totalH);
  ctx.lineTo(x+w, baseY+totalH);
  ctx.closePath();ctx.fill();
  // Side windows
  if(cfg.floors>1){
    for(let fl=0;fl<Math.min(cfg.floors-1,3);fl++){
      const fy=baseY+fl*floorH;
      const swx=x+w+4,swy=fy+6;
      const sww=isoDepth-8,swh=floorH-12;
      if(sww<6)continue;
      // Skew the side window to match parallelogram
      ctx.save();
      ctx.transform(1,0,-isoShift/totalH,1,x+w,baseY);
      ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(4,fl*floorH+5,sww+2,swh+2);
      const wg2=ctx.createLinearGradient(4,fl*floorH,4+sww,fl*floorH+swh);
      wg2.addColorStop(0,'rgba(200,160,80,.2)');wg2.addColorStop(1,'rgba(120,80,30,.08)');
      ctx.fillStyle=wg2;ctx.fillRect(5,fl*floorH+6,sww,swh);
      ctx.restore();
    }
  }

  // ── ISO TOP FACE ──
  ctx.fillStyle=topC;
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x+w, baseY);
  ctx.lineTo(x+w+isoDepth, baseY-isoShift);
  ctx.lineTo(x+isoDepth, baseY-isoShift);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.fillRect(x,baseY,w,2);

  // ── ROOF ──
  const roofBase=baseY;
  if(cfg.roofStyle==='palace'&&lv===10){
    // Merlon battlements across top
    ctx.fillStyle=shade(roofC,30);
    ctx.fillRect(x-10,roofBase-22,w+20+isoDepth,22);
    for(let mi=0;mi<Math.floor((w+isoDepth)/14);mi++){
      ctx.fillStyle=pal.trim+'cc';ctx.fillRect(x-10+mi*14,roofBase-32,10,12);
    }
    // Central palace spire
    ctx.fillStyle=pal.trim;ctx.fillRect(x+w/2-4,roofBase-54,8,34);
    ctx.fillStyle=shade(pal.trim,30);ctx.fillRect(x+w/2-2,roofBase-68,4,18);
    ctx.fillStyle='#ffd700';ctx.fillRect(x+w/2-3,roofBase-73,6,7);
    [-1,1].forEach(s=>{const sx=x+w/2+s*26;ctx.fillStyle=pal.trim+'cc';ctx.fillRect(sx-2,roofBase-38,4,18);ctx.fillStyle=pal.accent;ctx.fillRect(sx-1,roofBase-46,2,12);});
  } else if(cfg.roofStyle==='tower'&&lv>=8){
    ctx.fillStyle=roofC;ctx.fillRect(x-8,roofBase-18,w+16+isoDepth,20);
    ctx.fillStyle=shade(roofC,18);ctx.fillRect(x-8,roofBase-18,w+16+isoDepth,5);
    for(let pi=0;pi<Math.floor((w+isoDepth)/12);pi++){ctx.fillStyle=pal.trim+'77';ctx.fillRect(x-8+pi*12,roofBase-26,8,9);}
  } else if(cfg.roofStyle==='domed'&&lv>=6){
    ctx.fillStyle=roofC;ctx.fillRect(x-8,roofBase-14,w+16+isoDepth,16);
    ctx.fillStyle=shade(roofC,12);ctx.fillRect(x-8,roofBase-14,w+16+isoDepth,4);
    ctx.fillStyle=pal.trim+'77';ctx.fillRect(x+w/2-10,roofBase-20,20+isoDepth/2,7);
    ctx.fillStyle=pal.trim;ctx.fillRect(x+w/2-5,roofBase-26,10+isoDepth/4,8);
  } else if(cfg.roofStyle==='pitched'&&lv>=4){
    ctx.fillStyle=roofC;ctx.fillRect(x-7,roofBase-12,w+14+isoDepth,14);
    ctx.fillStyle=shade(roofC,10);ctx.fillRect(x-7,roofBase-12,w+14+isoDepth,4);
  } else {
    ctx.fillStyle=roofC;ctx.fillRect(x-5,roofBase-10,w+10+isoDepth,12);
    ctx.fillStyle=shade(roofC,7);ctx.fillRect(x-5,roofBase-10,w+10+isoDepth,3);
  }
  // Chimney
  ctx.fillStyle=shade(roofC,-25);ctx.fillRect(x+w-28,roofBase-30,12,20);
  ctx.fillStyle=shade(roofC,-35);ctx.fillRect(x+w-32,roofBase-34,20,6);
  // Smoke
  for(let si=0;si<3;si++){
    const sa=0.05+0.04*Math.sin(tick*.04+si*2);
    ctx.fillStyle=`rgba(200,200,220,${sa})`;
    ctx.fillRect(x+w-26+si,roofBase-34-si*9-Math.round(2*Math.sin(tick*.05+si)),8+si*2,8);
  }
  // Spire (lv6+)
  if(cfg.hasSpire&&lv<10){
    ctx.fillStyle=pal.trim+'cc';ctx.fillRect(x+w/2-3,roofBase-40,6,24);
    ctx.fillStyle=pal.accent+'99';ctx.fillRect(x+w/2-1,roofBase-52,2,16);
    ctx.fillStyle=pal.trim;ctx.fillRect(x+w/2-3,roofBase-56,6,6);
    if(lv>=8){
      const sp=0.6+0.4*Math.sin(tick*.1);
      ctx.fillStyle=`rgba(255,220,50,${sp})`;
      ctx.fillRect(x+w/2-2,roofBase-60,4,4);ctx.fillRect(x+w/2-4,roofBase-58,8,2);
    }
  }
  // Neon sign (lv6+)
  if(cfg.hasNeonSign){
    const np=0.55+0.45*Math.sin(tick*.11);
    const nx=x+w/2-20,ny=baseY+totalH-55;
    if(ny>baseY+10){
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(nx,ny,40,12);
      const tc=pal.trim+Math.round(np*255).toString(16).padStart(2,'0');
      ctx.fillStyle=tc;ctx.font='bold 5.5px "Space Mono"';ctx.textAlign='center';
      ctx.fillText({convert:'SWAP',compress:'SHRINK',pdf:'PDF',both:'COMBO'}[id]||'',x+w/2,ny+9);
      ctx.fillStyle=hexToRgba(pal.trim,np*0.12);ctx.fillRect(nx-4,ny-3,48,18);
    }
  }
  // Banner flags (lv5+)
  if(cfg.hasBanner){
    const bc=Math.min(3,lv>=8?3:2);
    for(let bi=0;bi<bc;bi++){
      const bx=x+8+bi*Math.floor((w-16)/bc);
      const by=baseY+4;
      ctx.fillStyle=pal.trim+'cc';ctx.fillRect(bx,by,2,16);
      const wv=Math.sin(tick*.08+bi*1.5);
      ctx.fillStyle=pal.accent;
      ctx.beginPath();ctx.moveTo(bx+2,by);ctx.lineTo(bx+13+wv*2,by+4);ctx.lineTo(bx+2,by+9);ctx.fill();
    }
  }
  // Glow orbs (lv9+)
  if(cfg.hasGlowOrbs){
    const oc=[pal.trim,pal.accent,'#ffffff'];
    [-1,0,1].forEach((side,i)=>{
      const ox=x+w/2+side*22;
      const oy=baseY-8+Math.round(4*Math.sin(tick*.06+i*2.1));
      const oa=0.5+0.5*Math.sin(tick*.09+i*1.6);
      ctx.fillStyle=oc[i%3];ctx.globalAlpha=oa*.85;ctx.fillRect(ox-3,oy-3,7,7);
      ctx.fillStyle=oc[i%3];ctx.globalAlpha=oa*.25;ctx.fillRect(ox-7,oy-7,15,15);
      ctx.globalAlpha=1;
    });
  }
  // Fountain (lv7+)
  if(cfg.hasFountain){
    const fx=x+w/2,fy2=baseY+totalH+5;
    ctx.fillStyle=pal.trim+'cc';ctx.fillRect(fx-16,fy2,32,5);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(fx-8,fy2-3,16,5);
    for(let fi2=0;fi2<5;fi2++){
      const fwa=0.3+0.3*Math.sin(tick*.1+fi2*1.2);
      ctx.fillStyle=`rgba(120,200,255,${fwa})`;
      ctx.fillRect(fx-4+fi2*2,fy2-6-fi2*2-Math.round(2*Math.sin(tick*.15+fi2)),2,4+fi2*2);
    }
  }
  // ── LEVEL BADGE ──
  const bx=x+w+isoDepth-14,bby=baseY-12;
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(bx,bby,16,11);
  ctx.fillStyle=lv>=10?'#ffd700':lv>=7?pal.trim:lv>=4?pal.accent:'#555';
  ctx.font='bold 6px "Space Mono"';ctx.textAlign='center';
  ctx.fillText('L'+lv,bx+8,bby+8);

  // ── SIGN (sits on building front, above door) ──
  const signAbsY = baseY + totalH - 52; // sign is ~52px above ground on front face
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(x+5,signAbsY-4,w-10,22);
  const sg=ctx.createLinearGradient(x+6,signAbsY,x+6,signAbsY+18);
  if(lv>=9){sg.addColorStop(0,pal.trim);sg.addColorStop(.5,shade(pal.trim,20));sg.addColorStop(1,pal.trim);}
  else{sg.addColorStop(0,'rgba(255,215,55,.95)');sg.addColorStop(1,'rgba(200,155,15,.88)');}
  ctx.fillStyle=sg;ctx.fillRect(x+7,signAbsY-2,w-14,18);
  ctx.fillStyle='rgba(0,0,0,.9)';ctx.font='bold 7px "Space Mono"';ctx.textAlign='center';
  ctx.fillText(sign,x+w/2,signAbsY+11);

  // ── NEAR HIGHLIGHT ──
  if(nearShop&&nearShop.id===id){
    ctx.save();
    ctx.shadowColor=glow.replace('.5','1');ctx.shadowBlur=22;
    ctx.strokeStyle='rgba(255,215,55,.88)';ctx.lineWidth=2.5;
    ctx.strokeRect(x-3,baseY-28,w+isoDepth+6,totalH+32);
    ctx.restore();
    const p=0.5+0.5*Math.sin(tick*.13);
    if(Math.floor(Date.now()/450)%2===0){
      ctx.fillStyle=`rgba(255,215,55,${p})`;ctx.fillRect(x+w/2-35,baseY-46,70,15);
      ctx.fillStyle='rgba(0,0,0,.9)';ctx.font='bold 5.5px "Space Mono"';ctx.textAlign='center';
      ctx.fillText('▶  PRESS ENTER',x+w/2,baseY-35);
    }
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(x+w/2-52,baseY+totalH+8,104,14);
    ctx.fillStyle='rgba(255,215,55,.8)';ctx.font='5px "Space Mono"';ctx.textAlign='center';
    ctx.fillText(SHOPS.find(ss=>ss.id===id).name,x+w/2,baseY+totalH+18);
  }
}

/* ════════════════════════════════
   PLAYER — isometric 3D pixel character
   Body drawn with 3 faces: front, right-side, top
════════════════════════════════ */
function drawPlayer(bx,by){
  // bx,by = bottom-left of character on canvas
  // Character base dimensions
  const W=16, D=10, isoD=6; // width, depth, iso-depth shift
  const flip=facing<0;
  const f=wf;
  const lo=[0,-4,0,4][f%4]; // leg oscillation
  const ao=[3,-3,3,-3][f%4]; // arm swing

  ctx.save();
  if(flip){ctx.translate(bx+W/2,0);ctx.scale(-1,1);ctx.translate(-(bx+W/2),0);}

  // ISO box helper: draws front+right+top of a box
  // ox,oy = top-left of front face, w,h = front face size, d = iso side depth
  function isoBox(ox,oy,w,h,d,cFront,cSide,cTop){
    // Front face
    ctx.fillStyle=cFront;ctx.fillRect(ox,oy,w,h);
    // Right side face (parallelogram)
    ctx.fillStyle=cSide;
    ctx.beginPath();
    ctx.moveTo(ox+w,oy);ctx.lineTo(ox+w+d,oy-Math.round(d*.5));
    ctx.lineTo(ox+w+d,oy-Math.round(d*.5)+h);ctx.lineTo(ox+w,oy+h);
    ctx.closePath();ctx.fill();
    // Top face (parallelogram)
    ctx.fillStyle=cTop;
    ctx.beginPath();
    ctx.moveTo(ox,oy);ctx.lineTo(ox+w,oy);
    ctx.lineTo(ox+w+d,oy-Math.round(d*.5));ctx.lineTo(ox+d,oy-Math.round(d*.5));
    ctx.closePath();ctx.fill();
  }

  // ── SHADOW ──
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath();ctx.ellipse(bx+W/2+isoD/2,by+2,W*.85,3,0,0,Math.PI*2);ctx.fill();

  // ── LEGS (shorter — 10px each) ──
  const legY=by-12;
  isoBox(bx,   legY+lo,  7,12,isoD,'#2233aa','#111d66','#3344bb');
  isoBox(bx+8, legY-lo,  7,12,isoD,'#1a2888','#0e1a55','#2233aa');
  // Shoes
  isoBox(bx-1, by-3+lo,  9, 4,isoD,'#e0d0ff','#a090cc','#f0e8ff');
  isoBox(bx+8, by-3-lo,  9, 4,isoD,'#c0aaee','#8070aa','#d8c8ff');

  // ── BODY (jacket, shorter — 13px) ──
  const bodyY=by-27;
  isoBox(bx-1,bodyY,18,14,isoD,'#7733dd','#4a1a99','#9944ff');
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bx-1,bodyY,18,3);
  ctx.fillStyle='rgba(255,204,0,.6)';ctx.fillRect(bx+6,bodyY+1,6,4);
  ctx.fillStyle='rgba(0,212,255,.3)';ctx.fillRect(bx+2,bodyY+7,4,4);

  // ── ARMS (shorter — 10px) ──
  const armY=by-25;
  isoBox(bx-6,armY+ao, 6,10,isoD,'#7733dd','#4a1a99','#9944ff');
  ctx.fillStyle='#ffcc88';ctx.fillRect(bx-7,armY+ao+9,8,6);
  isoBox(bx+18,armY-ao, 6,10,isoD,'#6622cc','#401188','#8833ee');
  ctx.fillStyle='#ffcc88';ctx.fillRect(bx+17,armY-ao+9,8,6);

  // ── HEAD (slightly smaller — 12px tall) ──
  const headY=by-41;
  ctx.fillStyle='#ffcc88';ctx.fillRect(bx+5,by-29,7,4); // neck
  isoBox(bx-1,headY,18,12,isoD,'#ffcc88','#cc9955','#ffdda0');
  // Hair
  ctx.fillStyle='#220044';ctx.fillRect(bx-1,headY,18,5);
  ctx.fillStyle='#1a0033';
  ctx.beginPath();
  ctx.moveTo(bx+17,headY);ctx.lineTo(bx+17+isoD,headY-Math.round(isoD*.5));
  ctx.lineTo(bx+17+isoD,headY-Math.round(isoD*.5)+5);ctx.lineTo(bx+17,headY+5);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(139,61,255,.5)';ctx.fillRect(bx+14,headY-1,5,2);
  // Eyes
  ctx.fillStyle='#0a0020';ctx.fillRect(bx+3,headY+6,3,3);ctx.fillRect(bx+11,headY+6,3,3);
  ctx.fillStyle='#ffffff';ctx.fillRect(bx+3,headY+6,2,2);ctx.fillRect(bx+11,headY+6,2,2);
  ctx.fillStyle='#00aaff';ctx.fillRect(bx+4,headY+7,1,1);ctx.fillRect(bx+12,headY+7,1,1);
  // Mouth
  ctx.fillStyle='#cc2244';ctx.fillRect(bx+6,headY+10,4,1);

  // ── HAT (compact) ──
  const hatY=headY-4;
  isoBox(bx-2,hatY,20,5,isoD,'#110044','#0a0022','#1a0066');
  isoBox(bx+3,hatY-7,12,8,isoD,'#110044','#0a0022','#1a0066');
  ctx.fillStyle='rgba(139,61,255,.85)';ctx.fillRect(bx+3,hatY+1,12,2);
  ctx.fillStyle='rgba(139,61,255,.5)';
  ctx.beginPath();
  ctx.moveTo(bx+15,hatY+1);ctx.lineTo(bx+15+isoD,hatY+1-Math.round(isoD*.5));
  ctx.lineTo(bx+15+isoD,hatY+3-Math.round(isoD*.5));ctx.lineTo(bx+15,hatY+3);
  ctx.closePath();ctx.fill();
  // Star
  ctx.fillStyle='#ffcc00';ctx.fillRect(bx+8,hatY-8,3,3);ctx.fillRect(bx+7,hatY-7,5,1);ctx.fillRect(bx+9,hatY-10,1,4);

  // ── SCROLL (near shop indicator) ──
  if(nearShop){
    const sx=bx+20,sy=by-22;
    isoBox(sx,sy,9,11,4,'#fffff0','#ddddbb','#ffffe8');
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(sx,sy,9,2);
    ctx.fillStyle='rgba(139,61,255,.4)';[4,6,8,10].forEach(yy=>ctx.fillRect(sx+2,sy+yy,5,1));
  }

  ctx.restore();
}

/* ════ GAME LOOP ════ */
function gameLoop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(!shopOpen&&!dlgOpen){
    const spd=200;
    if(keys['ArrowLeft']||keys['a']||keys['A']){pvx=-spd;facing=-1;}
    else if(keys['ArrowRight']||keys['d']||keys['D']){pvx=spd;facing=1;}
    else pvx=0;
    if(pvx!==0){wt+=dt;if(wt>.1){wf=(wf+1)%4;wt=0;}}
    px=Math.max(20,Math.min(CW-65,px+pvx*dt));
    const vw=document.getElementById('world-wrap').clientWidth;
    const tgt=Math.max(0,Math.min(CW-vw,px-vw/2));
    worldOff+=(tgt-worldOff)*.14;
    document.getElementById('world-c').style.transform=`translateX(${-worldOff}px)`;
  }
  nearShop=null;
  SHOPS.forEach(s=>{if(Math.abs(px+9-(s.x+s.w/2))<95)nearShop=s;});
  document.getElementById('hloc').textContent=nearShop?nearShop.name.substring(0,18):'TOWN SQUARE';
  ctx.clearRect(0,0,CW,CH);
  drawWorld();
  drawPlayer(px,py);
  requestAnimationFrame(gameLoop);
}

/* ════ INPUT ════ */
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='Enter'||e.key===' ')&&!shopOpen&&!dlgOpen){e.preventDefault();if(nearShop)enterShop(nearShop);}
  if(e.key==='Escape'&&shopOpen)closeShop();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Mouse cursor
document.addEventListener('mousemove',e=>{
  const c=document.getElementById('cursor');
  c.style.display='block';c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';
});

// Canvas reference (no tap-to-walk — use D-pad or keyboard)
const wc=document.getElementById('world-c');

function walkTo(tx){
  if(shopOpen)return;
  const dir=tx>px?1:-1;facing=dir;
  const iv=setInterval(()=>{
    px+=dir*5;wt+=.05;if(wt>.1){wf=(wf+1)%4;wt=0;}
    if((dir>0&&px>=tx)||(dir<0&&px<=tx)||keys['ArrowLeft']||keys['ArrowRight']||keys['a']||keys['d']){
      clearInterval(iv);
      // No auto-enter — user must press ENTER explicitly
    }
  },16);
}

/* ════ D-PAD ════ */
(function(){
  let holdIv=null;
  function startHold(dir){
    facing=dir;
    holdIv=setInterval(()=>{
      if(!shopOpen&&!dlgOpen){px=Math.max(20,Math.min(CW-65,px+dir*5));wt+=.05;if(wt>.1){wf=(wf+1)%4;wt=0;}}
    },16);
  }
  function stopHold(){clearInterval(holdIv);holdIv=null;}
  const dpL=document.getElementById('dp-l');
  const dpR=document.getElementById('dp-r');
  const dpM=document.getElementById('dp-mid');
  [dpL,dpR].forEach((btn,i)=>{
    const dir=i===0?-1:1;
    btn.addEventListener('touchstart',e=>{e.preventDefault();startHold(dir);},{passive:false});
    btn.addEventListener('touchend',e=>{e.preventDefault();stopHold();},{passive:false});
    btn.addEventListener('mousedown',()=>startHold(dir));
    btn.addEventListener('mouseup',()=>stopHold());
    // touchcancel safety
    btn.addEventListener('touchcancel',e=>{e.preventDefault();stopHold();},{passive:false});
  });
  dpM.addEventListener('click',()=>{
    if(shopOpen)closeShop();
    else if(dlgOpen)document.getElementById('dlg').click();
    else if(nearShop)enterShop(nearShop);
  });
  setInterval(()=>{
    if(!dpM)return;
    dpM.textContent=shopOpen?'✕ EXIT':nearShop?'▶ ENTER':'ENTER';
  },250);
})();

/* ════ GLOBAL DROP ════ */
const ww=document.getElementById('world-wrap');
ww.addEventListener('dragover',e=>{e.preventDefault();if(!shopOpen)ww.classList.add('drag-on');});
ww.addEventListener('dragleave',e=>{if(!e.relatedTarget||!ww.contains(e.relatedTarget))ww.classList.remove('drag-on');});
ww.addEventListener('drop',e=>{
  e.preventDefault();ww.classList.remove('drag-on');
  if(shopOpen)return;
  const files=Array.from(e.dataTransfer.files);if(!files.length)return;
  const shopId=nearShop?nearShop.id:autoDetect(files);
  const shop=SHOPS.find(s=>s.id===shopId)||SHOPS[0];
  addFiles(shopId,files);
  facing=shop.x+shop.w/2>px?1:-1;
  walkTo(Math.max(20,Math.min(CW-65,shop.x+shop.w/2-9)));
  toast(`${files.length} file(s) → ${shop.name}!`,'inf');
});
function autoDetect(files){
  const ex=files.map(f=>f.name.split('.').pop().toLowerCase());
  if(ex.some(e=>e==='pdf'))return'pdf';
  if(ex.some(e=>['docx','pptx','xlsx'].includes(e)))return'convert';
  return'convert';
}

function refreshSidebar(id){
  const files=S[id].files;
  const cnt=document.getElementById('sb-cnt');if(cnt)cnt.textContent=files.length;
  const fl=document.getElementById('sb-files');if(!fl)return;
  fl.innerHTML='';
  if(files.length===0){
    fl.innerHTML='<div style="padding:16px 12px;text-align:center;font-size:10.5px;color:var(--t3);line-height:1.5">No files yet.<br>Drop or browse above!</div>';
    return;
  }
  files.forEach((item,i)=>{
    const ext=item.file.name.split('.').pop().toUpperCase();
    const origSz=fmt(item.file.size);
    const outSz=item.outSize?fmt(item.outSize):null;
    const statusCls=item.status==='done'?'done':item.status==='error'?'err':'';
    const row=document.createElement('div');row.className='sf '+statusCls;row.id=`sf-${id}-${i}`;
    let act='';
    if(item.status==='done'&&item.url)act=`<a class="sf-dl" href="${item.url}" download="${item.outName}">↓ Save</a>`;
    else if(item.status==='working')act=`<span class="sf-spin">⚙</span>`;
    else if(item.status==='error')act=`<span class="sf-err-t" title="${esc(item.err||'')}">Error</span>`;
    const sizeHtml=outSz
      ?`<span>${origSz}</span> <span class="arrow">→ ${outSz}</span>`
      :origSz;
    row.innerHTML=`<span class="sf-ext">${ext}</span><div class="sf-body"><div class="sf-name" title="${esc(item.file.name)}">${esc(item.file.name)}</div><div class="sf-size">${sizeHtml}</div></div>${act}`;
    fl.appendChild(row);
  });
  const done=files.filter(f=>f.status==='done').length;
  const zip=document.getElementById('sb-zip');if(zip)zip.style.display=done>1?'flex':'none';
  const res=document.getElementById('sb-res');
  if(res&&done>0){res.style.display='block';res.innerHTML=`✔ ${done} file${done>1?'s':''} ready!`;}
  else if(res){res.style.display='none';}
}

async function runShop(id){

async function runConvert(){
  if(!S.convert.files.length){toast('Drop some files first!','err');return;}
  const btn=document.getElementById('sb-go');if(btn)btn.disabled=true;
  let ok=0,fail=0;
  for(let i=0;i<S.convert.files.length;i++){
    const item=S.convert.files[i];item.status='working';refreshSidebar('convert');
    try{const from=item.file.name.split('.').pop().toLowerCase();const blob=await convertFile(item.file,from,S.convert.to);item.url=URL.createObjectURL(blob);item.outName=item.file.name.replace(/\.[^.]+$/,'')+'.'+S.convert.to;item.outSize=blob.size;item.status='done';ok++;earnCoins(5);earnXP(10);}
    catch(e){item.status='error';item.err=e.message;fail++;}
    refreshSidebar('convert');
  }
  if(btn)btn.disabled=false;
  if(ok)toast(`✔ ${ok} converted!`,'ok');if(fail)toast(`✗ ${fail} failed`,'err');
}
async function runCompress(){
  if(!S.compress.files.length){toast('Drop some files first!','err');return;}
  const tb=S.compress.size?(parseFloat(S.compress.size)*(S.compress.unit==='MB'?1048576:1024)):0;
  if(!tb){toast('Set a target size first!','err');return;}
  const btn=document.getElementById('sb-go');if(btn)btn.disabled=true;
  let ok=0,fail=0;
  for(let i=0;i<S.compress.files.length;i++){
    const item=S.compress.files[i];item.status='working';refreshSidebar('compress');
    try{const ext=item.file.name.split('.').pop().toLowerCase();const blob=await compressBlob(new Blob([await item.file.arrayBuffer()],{type:item.file.type}),ext,tb,S.compress.quality);item.url=URL.createObjectURL(blob);item.outName=item.file.name.replace(/\.[^.]+$/,'')+'-compressed.'+ext;item.outSize=blob.size;item.status='done';ok++;earnCoins(3);earnXP(8);}
    catch(e){item.status='error';item.err=e.message;fail++;}
    refreshSidebar('compress');
  }
  if(btn)btn.disabled=false;
  if(ok)toast(`✔ ${ok} compressed!`,'ok');if(fail)toast(`✗ ${fail} failed`,'err');
}
async function runPdf(){
  if(!S.pdf.files.length){toast('Drop PDF files first!','err');return;}
  const btn=document.getElementById('sb-go');if(btn)btn.disabled=true;
  const tool=S.pdf.tool;
  if(tool==='merge'){
    try{S.pdf.files.forEach(f=>f.status='working');refreshSidebar('pdf');const[blob]=await pdfMerge(S.pdf.files.map(f=>f.file));const url=URL.createObjectURL(blob);S.pdf.files.forEach(f=>{f.url=url;f.outName='merged.pdf';f.outSize=blob.size;f.status='done';});earnCoins(6);earnXP(15);}
    catch(e){S.pdf.files.forEach(f=>{f.status='error';f.err=e.message;});}
    refreshSidebar('pdf');if(btn)btn.disabled=false;toast('PDFs merged!','ok');return;
  }
  if(tool==='topdf'){
    try{S.pdf.files.forEach(f=>f.status='working');refreshSidebar('pdf');const[blob]=await imagesToPdf(S.pdf.files.map(f=>f.file));const url=URL.createObjectURL(blob);S.pdf.files.forEach(f=>{f.url=url;f.outName='images-to-pdf.pdf';f.outSize=blob.size;f.status='done';});earnCoins(5);earnXP(12);}
    catch(e){S.pdf.files.forEach(f=>{f.status='error';f.err=e.message;});}
    refreshSidebar('pdf');if(btn)btn.disabled=false;toast('Images → PDF done!','ok');return;
  }
  let ok=0,fail=0;
  for(let i=0;i<S.pdf.files.length;i++){
    const item=S.pdf.files[i];item.status='working';refreshSidebar('pdf');
    try{
      let blob,ext='pdf';
      if(tool==='compress'){[blob,ext]=await pdfCompress(item.file);}
      else if(tool==='split'){[blob,ext]=await pdfSplitAdv(item.file);}
      else if(tool==='rotate'){[blob,ext]=await pdfRotate(item.file,S.pdf.rotDeg);}
      else if(tool==='toimg'){[blob,ext]=await pdfToImages(item.file);}
      else if(tool==='text'){[blob,ext]=await pdfExtractText(item.file);}
      else if(tool==='watermark'){[blob,ext]=await pdfWatermark(item.file);}
      else if(tool==='organize'){[blob,ext]=await pdfCompress(item.file);}
      item.url=URL.createObjectURL(blob);item.outName=item.file.name.replace(/\.[^.]+$/,'')+'-'+tool+'.'+ext;item.outSize=blob.size;item.status='done';ok++;earnCoins(4);earnXP(12);
    }catch(e){item.status='error';item.err=e.message;fail++;}
    refreshSidebar('pdf');
  }
  if(btn)btn.disabled=false;
  if(ok)toast(`✔ ${ok} PDF(s) done!`,'ok');if(fail)toast(`✗ ${fail} failed`,'err');
}

// (LEVEL_UNLOCKS defined below)

function earnCoins(n){
  coins+=n;
  saveGame();
  document.getElementById('coin-ct').textContent=coins;
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;top:50px;right:90px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#ffcc00;z-index:999;pointer-events:none;animation:coinpop .9s ease forwards`;
  el.textContent='+'+n+' ✦';
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

function earnXP(n){
  if(level>=10){
    // Max level — accumulate XP as "score" beyond 100 but don't level up
    xp=Math.min(xp+n,999);
    saveGame();
    updateHudXP();
    return;
  }
  xp+=n;
  while(xp>=100&&level<10){
    xp-=100;
    level++;
    document.getElementById('lv-ct').textContent=level;
    triggerLevelUp(level);
  }
  if(level>=10)xp=Math.min(xp,100);
  saveGame();
  updateHudXP();
}
function updateHudXP(){
  const pct=level>=10?100:Math.min(100,Math.round(xp));
  const hf=document.getElementById('hxp-fill');if(hf)hf.style.width=pct+'%';
  const hp=document.getElementById('hxp-pct');if(hp)hp.textContent=level>=10?'MAX':pct+'/100';
  const sl=document.getElementById('sph-lv');if(sl)sl.textContent=level;
}

function triggerLevelUp(lv){
  // Particles burst
  spawnLvUpParticles();
  // Show overlay + card
  const overlay=document.getElementById('lvup-overlay');
  const card=document.getElementById('lvup-card');
  if(!overlay||!card)return;

  // Set colors per shop nearest to player
  const nearId=nearShop?.id||'convert';
  const pal=SHOP_PALETTES[nearId][lv-1];
  card.style.borderColor=pal.trim;
  card.style.boxShadow=`0 0 80px ${pal.glow||'rgba(123,79,255,.4)'},0 0 160px rgba(0,0,0,.5)`;

  // Level color
  const lvColors={1:'#c084fc',2:'#c084fc',3:'#6ee87a',4:'#6ee87a',5:'#00d4ff',6:'#00d4ff',7:'#ff88cc',8:'#ff88cc',9:'#ffcc00',10:'#ffd700'};
  document.getElementById('lvu-num').style.color=lvColors[lv]||'#c084fc';
  document.getElementById('lvu-num').textContent=lv;
  document.getElementById('lvu-rank').textContent=
    lv<=2?'APPRENTICE':lv<=4?'CRAFTSMAN':lv<=6?'ARTISAN':lv<=8?'MASTER':lv===9?'GRANDMASTER':'✦ LEGENDARY ✦';
  const unlockEl=document.getElementById('lvu-text');
  if(lv>=10){
    unlockEl.innerHTML=`
      <div style="color:#ffd700;font-size:15px;margin-bottom:8px">🏆 MAX LEVEL REACHED!</div>
      <div style="font-size:12px;color:#c084fc;margin-bottom:6px">Your town is fully legendary.</div>
      <div style="background:rgba(139,61,255,.15);border:1px solid rgba(139,61,255,.3);border-radius:8px;padding:10px;margin-top:8px">
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:#ffcc00;letter-spacing:.1em;margin-bottom:4px">🚧 MORE LEVELS COMING SOON</div>
        <div style="font-size:11px;color:#9b8fc0">New shops, tools & building types are in development!<br>Keep converting to build your final score.</div>
      </div>
      <div style="margin-top:10px;font-family:'Space Mono',monospace;font-size:10px;color:#5a4f80">Final Score: <span style="color:#ffcc00">${coins} coins · LV${lv}</span></div>`;
  } else {
    unlockEl.innerHTML=LEVEL_UNLOCKS[lv]||'Keep converting to grow your town!';
  }

  overlay.style.display='block';
  card.style.display='block';
  card.style.animation='lvup-in .5s cubic-bezier(.34,1.56,.64,1) forwards';

function closeLvUp(){
  const overlay=document.getElementById('lvup-overlay');
  const card=document.getElementById('lvup-card');
  if(!card||card.style.display==='none')return;
  card.style.animation='lvup-out .35s ease forwards';
  setTimeout(()=>{
    overlay.style.display='none';
    card.style.display='none';
  },350);
}

function spawnLvUpParticles(){
  const colors=['#7b4fff','#00d4ff','#ff2d78','#ffcc00','#00ff96','#ff88cc'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='particle';
    el.style.background=colors[i%colors.length];
    el.style.left=(30+Math.random()*40)+'vw';
    el.style.top=(30+Math.random()*40)+'vh';
    const angle=Math.random()*Math.PI*2;
    const dist=80+Math.random()*160;
    el.style.setProperty('--tx',Math.cos(angle)*dist+'px');
    el.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    el.style.animationDelay=(Math.random()*.3)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}



/* ══════════════════════════════════════════════
   FULL CONVERSION ENGINE
══════════════════════════════════════════════ */
async function convertFile(file,fromExt,toExt){
  if(fromExt==='pdf'&&toExt==='txt')return pdfToTxt(file);
  if(fromExt==='pdf'&&toExt==='html')return pdfToHtml(file);
  if(fromExt==='pdf'&&toExt==='png'){const[b]=await pdfToImages(file);return b;}
  if(fromExt==='pdf'&&toExt==='csv')return pdfToCsv(file);
  const imgE=['jpg','jpeg','png','webp','svg','heic'];
  if(imgE.includes(fromExt)&&toExt==='pdf')return imgToPdf(file,fromExt);
  if(fromExt==='heic')return heicToImg(file,toExt);
  if(fromExt==='docx')return docxConv(file,toExt);
  if(fromExt==='pptx')return pptxConv(file,toExt);
  if(fromExt==='xlsx')return xlsxConv(file,toExt);
  if(imgE.includes(fromExt))return imgToImg(file,toExt);
  if(['mp4','webm','mov'].includes(fromExt))return extractAudio(file,toExt);
  if(['mp3','wav','ogg','aac','m4a'].includes(fromExt))return audioToAudio(file,toExt);
  if(['json','csv','xml'].includes(fromExt)||['json','csv','xml'].includes(toExt))return dataToData(file,fromExt,toExt);
  return docToDoc(file,fromExt,toExt);
}
async function imgToImg(file,toExt){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(u);const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;const ct=c.getContext('2d');if(['jpg','jpeg'].includes(toExt)){ct.fillStyle='#fff';ct.fillRect(0,0,c.width,c.height);}ct.drawImage(img,0,0);c.toBlob(b=>{b?res(b):rej(new Error('fail'));},getMime(toExt),.95);};img.onerror=()=>rej(new Error('img load'));img.src=u;});}
async function imgToPdf(file,fromExt){const doc=await PDFLib.PDFDocument.create();const bytes=new Uint8Array(await file.arrayBuffer());let img;if(['jpg','jpeg'].includes(fromExt)){img=await doc.embedJpg(bytes);}else{const b=await imgToImg(file,'png');img=await doc.embedPng(new Uint8Array(await b.arrayBuffer()));}const{width,height}=img;const page=doc.addPage([width,height]);page.drawImage(img,{x:0,y:0,width,height});return new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'});}
async function heicToImg(file,toExt){const bm=await createImageBitmap(file);const c=document.createElement('canvas');c.width=bm.width;c.height=bm.height;const ct=c.getContext('2d');if(['jpg','jpeg'].includes(toExt)){ct.fillStyle='#fff';ct.fillRect(0,0,c.width,c.height);}ct.drawImage(bm,0,0);bm.close();return new Promise((res,rej)=>c.toBlob(b=>b?res(b):rej(new Error('HEIC')),getMime(toExt),.92));}
async function audioToAudio(file,toExt){try{const ac=new AudioContext(),buf=await ac.decodeAudioData(await file.arrayBuffer());await ac.close();return toExt==='wav'?audioBufToWav(buf):encodeViaRecorder(buf,toExt);}catch{return new Blob([await file.arrayBuffer()],{type:getMime(toExt)});}}
async function extractAudio(file,toExt){const ac=new AudioContext(),buf=await ac.decodeAudioData(await file.arrayBuffer());await ac.close();return toExt==='wav'?audioBufToWav(buf):encodeViaRecorder(buf,toExt);}
function audioBufToWav(buf){const nc=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length*nc*2+44;const ab=new ArrayBuffer(len),v=new DataView(ab);const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};ws(0,'RIFF');v.setUint32(4,len-8,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nc,true);v.setUint32(24,sr,true);v.setUint32(28,sr*nc*2,true);v.setUint16(32,nc*2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,buf.length*nc*2,true);let off=44;for(let i=0;i<buf.length;i++)for(let c=0;c<nc;c++){const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;}return new Blob([ab],{type:'audio/wav'});}
async function encodeViaRecorder(audioBuf,toExt){const sup=['audio/webm;codecs=opus','audio/webm','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'audio/webm';const ctx2=new AudioContext(),src=ctx2.createBufferSource();src.buffer=audioBuf;const dst=ctx2.createMediaStreamDestination();src.connect(dst);const rec=new MediaRecorder(dst.stream,{mimeType:sup}),chunks=[];rec.ondataavailable=e=>chunks.push(e.data);return new Promise((res,rej)=>{rec.onstop=()=>{ctx2.close();res(new Blob(chunks,{type:getMime(toExt)}));};rec.onerror=rej;rec.start();src.start(0);src.onended=()=>rec.stop();});}
async function docxConv(file,toExt){const zip=await JSZip.loadAsync(await file.arrayBuffer());const xmlEntry=zip.file('word/document.xml');if(!xmlEntry)throw new Error('Invalid DOCX');const xmlStr=await xmlEntry.async('string');const xmlDoc=new DOMParser().parseFromString(xmlStr,'application/xml');const paras=[...xmlDoc.getElementsByTagName('w:p')];const txt=paras.map(p=>[...p.getElementsByTagName('w:t')].map(t=>t.textContent||'').join('')).join('\n');if(toExt==='txt')return new Blob([txt],{type:'text/plain'});if(toExt==='pdf')return textToPdf(txt,file.name);if(toExt==='html')return new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><pre style="white-space:pre-wrap;font-family:sans-serif;max-width:800px;margin:auto;padding:2rem">${txt.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre></body></html>`],{type:'text/html'});return new Blob([txt],{type:'text/plain'});}
async function pptxConv(file,toExt){const zip=await JSZip.loadAsync(await file.arrayBuffer());const sfs=Object.keys(zip.files).filter(n=>n.match(/^ppt\/slides\/slide\d+\.xml$/)).sort();const slides=[];for(const sf of sfs){const xml=await zip.file(sf).async('string');const doc=new DOMParser().parseFromString(xml,'application/xml');slides.push([...doc.getElementsByTagName('a:t')].map(t=>t.textContent||'').filter(t=>t.trim()));}const txt=slides.map((s,i)=>`=== Slide ${i+1} ===\n${s.join('\n')}`).join('\n\n');if(toExt==='txt')return new Blob([txt],{type:'text/plain'});if(toExt==='pdf')return textToPdf(txt,file.name);return new Blob([txt],{type:'text/plain'});}
async function xlsxConv(file,toExt){const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});if(toExt==='csv')return new Blob([XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]])],{type:'text/csv'});if(toExt==='json'){const r={};wb.SheetNames.forEach(n=>{r[n]=XLSX.utils.sheet_to_json(wb.Sheets[n]);});return new Blob([JSON.stringify(r,null,2)],{type:'application/json'});}if(toExt==='pdf')return textToPdf(XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]),file.name);if(toExt==='html'){const h=wb.SheetNames.map(n=>`<h2>${n}</h2>`+XLSX.utils.sheet_to_html(wb.Sheets[n])).join('<hr>');return new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>table{border-collapse:collapse}td,th{border:1px solid #ccc;padding:4px 8px}</style></head><body>${h}</body></html>`],{type:'text/html'});}return new Blob([XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]])],{type:'text/csv'});}
async function dataToData(file,from,to){const text=await file.text();if(from==='json'&&to==='csv'){try{const d=JSON.parse(text);const arr=Array.isArray(d)?d:[d];const k=Object.keys(arr[0]||{});return new Blob([[k.join(','),...arr.map(r=>k.map(h=>JSON.stringify(r[h]??'')).join(','))].join('\n')],{type:'text/csv'});}catch{return new Blob([text],{type:'text/csv'});}}if(from==='csv'&&to==='json'){const rows=text.trim().split('\n').map(r=>r.split(','));const h=rows[0];return new Blob([JSON.stringify(rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>{o[k]=(r[i]||'').replace(/^"|"$/g,'');});return o;}),null,2)],{type:'application/json'});}return new Blob([text],{type:getMime(to)});}
async function docToDoc(file,from,to){const text=await file.text();if(to==='pdf')return textToPdf(text,file.name);return new Blob([text],{type:getMime(to)});}
async function textToPdf(text,title='Doc'){const doc=await PDFLib.PDFDocument.create();const font=await doc.embedFont(PDFLib.StandardFonts.Helvetica);const PW=595,PH=842,M=50,LH=16,FS=10,MW=PW-M*2;let page=doc.addPage([PW,PH]),y=PH-M;for(const rawLine of text.split('\n')){const words=rawLine.split(' ');let cur='';for(const word of words){const test=cur?cur+' '+word:word;if(font.widthOfTextAtSize(test,FS)>MW&&cur){if(y<M+LH){page=doc.addPage([PW,PH]);y=PH-M;}page.drawText(cur.substring(0,120),{x:M,y,size:FS,font,color:PDFLib.rgb(.1,.1,.1)});y-=LH;cur=word;}else cur=test;}if(y<M+LH){page=doc.addPage([PW,PH]);y=PH-M;}if(cur.trim())page.drawText(cur.substring(0,120),{x:M,y,size:FS,font,color:PDFLib.rgb(.1,.1,.1)});y-=LH;}return new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'});}
async function pdfCompress(file){const bytes=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(new Uint8Array(bytes),{ignoreEncryption:true});try{doc.setTitle('');doc.setAuthor('');doc.setSubject('');doc.setKeywords([]);doc.setProducer('');doc.setCreator('');}catch(e){}return[new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'}),'pdf'];}
async function pdfRotate(file,deg){const doc=await PDFLib.PDFDocument.load(new Uint8Array(await file.arrayBuffer()),{ignoreEncryption:true});doc.getPages().forEach(p=>{const c=p.getRotation().angle;p.setRotation(PDFLib.degrees((c+deg)%360));});return[new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'}),'pdf'];}
async function pdfToImages(file){const bytes=new Uint8Array(await file.arrayBuffer());const pdf=await pdfjsLib.getDocument({data:bytes}).promise;const zip=new JSZip();const base=file.name.replace(/\.pdf$/i,'');for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const vp=page.getViewport({scale:2});const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;const blob=await new Promise(r=>c.toBlob(r,'image/png'));zip.file(`${base}-p${i}.png`,blob);}return[await zip.generateAsync({type:'blob'}),'zip'];}
async function imagesToPdf(fileList){const doc=await PDFLib.PDFDocument.create();for(const f of fileList){try{const ext=f.name.split('.').pop().toLowerCase();const bytes=new Uint8Array(await f.arrayBuffer());let img;if(['jpg','jpeg'].includes(ext))img=await doc.embedJpg(bytes);else{const b=await imgToImg(f,'png');img=await doc.embedPng(new Uint8Array(await b.arrayBuffer()));}const pg=doc.addPage([img.width,img.height]);pg.drawImage(img,{x:0,y:0,width:img.width,height:img.height});}catch(e){}}return[new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'}),'pdf'];}
async function pdfExtractText(file){const bytes=new Uint8Array(await file.arrayBuffer());const pdf=await pdfjsLib.getDocument({data:bytes}).promise;let text='';for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();text+=`\n--- Page ${i} ---\n`+c.items.map(it=>it.str).join(' ')+'\n';}return[new Blob([text.trim()],{type:'text/plain'}),'txt'];}
async function pdfToTxt(file){const[b]=await pdfExtractText(file);return b;}
async function pdfToHtml(file){const[b]=await pdfExtractText(file);const t=await b.text();return new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><pre style="white-space:pre-wrap;font-family:sans-serif;max-width:800px;margin:auto;padding:2rem">${t.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre></body></html>`],{type:'text/html'});}
async function pdfToCsv(file){const bytes=new Uint8Array(await file.arrayBuffer());const pdf=await pdfjsLib.getDocument({data:bytes}).promise;const rows=[];for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const content=await page.getTextContent();const lm=new Map();for(const item of content.items){const y=Math.round(item.transform[5]/2)*2;if(!lm.has(y))lm.set(y,[]);lm.get(y).push({x:item.transform[4],text:item.str});}[...lm.keys()].sort((a,b)=>b-a).forEach(y=>{const items=lm.get(y).sort((a,b)=>a.x-b.x);const row=items.map(i=>i.text.trim()).filter(t=>t);if(row.length)rows.push(row);});}return new Blob([rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(',')).join('\r\n')],{type:'text/csv'});}
async function pdfMerge(files){const merged=await PDFLib.PDFDocument.create();for(const f of files){try{const doc=await PDFLib.PDFDocument.load(new Uint8Array(await f.arrayBuffer()),{ignoreEncryption:true});const copied=await merged.copyPages(doc,doc.getPageIndices());copied.forEach(p=>merged.addPage(p));}catch(e){}}return[new Blob([await merged.save({useObjectStreams:true})],{type:'application/pdf'}),'pdf'];}
async function pdfSplitAdv(file){
  const src=await PDFLib.PDFDocument.load(new Uint8Array(await file.arrayBuffer()),{ignoreEncryption:true});
  const total=src.getPageCount();const base=file.name.replace(/\.pdf$/i,'');
  const P=S.pdf;
  function parseR(str,max){const pages=new Set();str.split(/[,;]+/).forEach(p=>{const t=p.trim();const m=t.match(/^(\d+)\s*-\s*(\d+)$/);if(m){const a=parseInt(m[1])-1,b=parseInt(m[2])-1;for(let i=Math.max(0,a);i<=Math.min(max-1,b);i++)pages.add(i);}else{const n=parseInt(t)-1;if(!isNaN(n)&&n>=0&&n<max)pages.add(n);}});return[...pages].sort((a,b)=>a-b);}
  let chunks=[];
  if(P.splitMode==='each'){for(let i=0;i<total;i++)chunks.push([i]);}
  else if(P.splitMode==='range'){const raw=P.splitRange;if(!raw)throw new Error('Enter ranges');chunks=raw.split(/[;|]+/).map(p=>parseR(p,total)).filter(c=>c.length);}
  else if(P.splitMode==='every'){const n=P.splitN||2;for(let i=0;i<total;i+=n)chunks.push(Array.from({length:Math.min(n,total-i)},(_,j)=>i+j));}
  else if(P.splitMode==='pages'){chunks=[parseR(P.splitPages,total)];}
  if(!chunks.length)throw new Error('No valid pages');
  const blobs=[];
  for(const chunk of chunks){const d=await PDFLib.PDFDocument.create();const c=await d.copyPages(src,chunk);c.forEach(pg=>d.addPage(pg));blobs.push(new Blob([await d.save()],{type:'application/pdf'}));}
  for(let i=1;i<blobs.length;i++){const b=blobs[i];const url=URL.createObjectURL(b);const sfx=P.splitMode==='each'?`-p${chunks[i][0]+1}`:`-part${i+1}`;S.pdf.files.push({file:new File([b],base+sfx+'.pdf'),status:'done',url,outName:base+sfx+'.pdf',outSize:b.size,err:null});}
  return[blobs[0],'pdf'];
}
async function pdfWatermark(file){
  const P=S.pdf;
  const doc=await PDFLib.PDFDocument.load(new Uint8Array(await file.arrayBuffer()),{ignoreEncryption:true});
  const font=await doc.embedFont(PDFLib.StandardFonts.HelveticaBold);
  for(const page of doc.getPages()){
    const{width,height}=page.getSize();
    const pos=getWmPos(P.wmPos,width,height);
    const opacity=P.wmOpacity/100;const rotDeg=P.wmRotation;
    if(P.wmTab==='image'&&P.wmImg){
      const bytes=new Uint8Array(await P.wmImg.arrayBuffer());
      const ext=P.wmImg.name.split('.').pop().toLowerCase();
      let img;if(['jpg','jpeg'].includes(ext))img=await doc.embedJpg(bytes);else{const bm=await createImageBitmap(P.wmImg);const c=document.createElement('canvas');c.width=bm.width;c.height=bm.height;c.getContext('2d').drawImage(bm,0,0);const b=await new Promise(r=>c.toBlob(r,'image/png'));img=await doc.embedPng(new Uint8Array(await b.arrayBuffer()));}
      const scale=P.wmImgScale/100;const pdfScale=Math.min(width,height)/800*scale;const dw=img.width*pdfScale;const dh=img.height*pdfScale;
      page.drawImage(img,{x:pos.x-dw/2,y:pos.y-dh/2,width:dw,height:dh,opacity,rotate:PDFLib.degrees(rotDeg)});
    }else{
      const txt=(P.wmText||'WATERMARK').toUpperCase();const fs=P.wmSize;
      const hex=P.wmColor;const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
      const tw=font.widthOfTextAtSize(txt,fs);
      page.drawText(txt,{x:pos.x-tw/2,y:pos.y-fs/2,size:fs,font,color:PDFLib.rgb(r,g,b),opacity,rotate:PDFLib.degrees(rotDeg)});
    }
  }
  return[new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'}),'pdf'];
}
function getWmPos(pos,W,H){const pad=50;const m={tl:{x:pad,y:H-pad},tc:{x:W/2,y:H-pad},tr:{x:W-pad,y:H-pad},ml:{x:pad,y:H/2},center:{x:W/2,y:H/2},mr:{x:W-pad,y:H/2},bl:{x:pad,y:pad},bc:{x:W/2,y:pad},br:{x:W-pad,y:pad}};return m[pos]||{x:W/2,y:H/2};}



/* ══════════════════════════════════════════════
   COMPRESS ENGINE
══════════════════════════════════════════════ */
const QCfg={max:{startQ:.95,minQ:.5},balanced:{startQ:.88,minQ:.25},smallest:{startQ:.8,minQ:.1}};
async function compressBlob(blob,ext,targetBytes,quality='balanced'){
  const cat=getCat(ext);
  if(blob.size<=targetBytes*.97)return blob;
  if(cat==='image')return compressImg(blob,['jpg','jpeg','webp'].includes(ext)?ext:'jpg',targetBytes,quality);
  if(ext==='pdf'){try{const doc=await PDFLib.PDFDocument.load(new Uint8Array(await blob.arrayBuffer()),{ignoreEncryption:true});try{doc.setTitle('');doc.setAuthor('');doc.setSubject('');doc.setKeywords([]);doc.setProducer('');doc.setCreator('');}catch(e){}return new Blob([await doc.save({useObjectStreams:true})],{type:'application/pdf'});}catch{return blob;}}
  if(['docx','pptx','xlsx'].includes(ext)){try{const zip=await JSZip.loadAsync(blob);const nz=new JSZip();for(const name in zip.files){nz.file(name,await zip.files[name].async('uint8array'),{compression:'DEFLATE',compressionOptions:{level:9}});}const c=await nz.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:9}});if(c.size<blob.size)return c;}catch(e){}}
  return blob;
}
async function compressImg(blob,outExt,targetBytes,quality='balanced'){
  const cfg=QCfg[quality]||QCfg.balanced;const mime=getMime(outExt);
  const img=await new Promise((res,rej)=>{const i=new Image();const u=URL.createObjectURL(blob);i.onload=()=>{URL.revokeObjectURL(u);res(i);};i.onerror=rej;i.src=u;});
  const W=img.naturalWidth,H=img.naturalHeight;
  const render=(w,h,q)=>new Promise(r=>{const c=document.createElement('canvas');c.width=w;c.height=h;const ct=c.getContext('2d');ct.fillStyle='#fff';ct.fillRect(0,0,w,h);ct.drawImage(img,0,0,w,h);c.toBlob(b=>r(b||blob),mime,q);});
  let q=cfg.startQ;while(q>=cfg.minQ){const b=await render(W,H,q);if(b.size<=targetBytes)return b;q-=.03;}
  let scale=.95;while(scale>.25){const b=await render(Math.round(W*scale),Math.round(H*scale),cfg.minQ);if(b.size<=targetBytes)return b;scale*=.92;}
  return blob;
}
function getCat(fmt){for(const[c,d]of Object.entries(FORMATS))if(d.fmts.includes(fmt))return c;return'doc';}
function getMime(ext){return({jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',webp:'image/webp',svg:'image/svg+xml',heic:'image/heic',mp3:'audio/mpeg',wav:'audio/wav',ogg:'audio/ogg',aac:'audio/aac',m4a:'audio/mp4',mp4:'video/mp4',webm:'video/webm',mov:'video/quicktime',pdf:'application/pdf',docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',pptx:'application/vnd.openxmlformats-officedocument.presentationml.presentation',xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',txt:'text/plain',html:'text/html',json:'application/json',csv:'text/csv',xml:'application/xml',zip:'application/zip'})[ext]||'application/octet-stream';}
const fmt=b=>!b||isNaN(b)?'?':b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(2)+'MB';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
